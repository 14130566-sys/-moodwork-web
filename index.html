<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta httpEquiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>MoodWork</title>
    <!-- The `react-native-web` recommended style reset: https://necolas.github.io/react-native-web/docs/setup/#root-element -->
    <style id="expo-reset">
      /* These styles make the body full-height */
      html,
      body {
        height: 100%;
      }
      /* These styles disable body scrolling if you are using <ScrollView> */
      body {
        overflow: hidden;
      }
      /* These styles make the root element full-height */
      #root {
        display: flex;
        height: 100%;
        flex: 1;
      }
    </style>
  </head>

  <body>
    <!-- Use static rendering with Expo Router to support running without JavaScript. -->
    <noscript>
      You need to enable JavaScript to run this app.
    </noscript>
    <!-- The root element for your Expo app. -->
    <div id="root"></div>
  <script src="/_expo/static/js/web/entry-810e11be6ea0cf3040099d9f54fee9a5.js" defer></script>
      <div id="pwa-install-container" style="display:none; position:fixed; bottom:20px; left:50%; transform:translateX(-50%); z-index:999999; width:90%; max-width:400px;">
    <button id="pwa-install-btn" style="width:100%; background-color:#4CAF50; color:white!important; border:none; padding:12px; font-size:16px; font-weight:bold; border-radius:8px; box-shadow:0 4px 10px rgba(0,0,0,0.3); cursor:pointer;">📥 安裝 MoodWork 至手機桌面</button>
  </div>
  <script>
    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault(); deferredPrompt = e;
      document.getElementById('pwa-install-container').style.display = 'block';
    });
    document.getElementById('pwa-install-btn').addEventListener('click', async () => {
      if (!deferredPrompt) return; deferredPrompt.prompt();
      await deferredPrompt.userChoice; deferredPrompt = null;
      document.getElementById('pwa-install-container').style.display = 'none';
    });
    window.addEventListener('appinstalled', () => {
      document.getElementById('pwa-install-container').style.display = 'none';
      deferredPrompt = null; alert('MoodWork App 已成功安裝到妳的桌面囉！💰');
    });
  </script>
  <script>
    (function() {
      let touchstartX = 0;
      let touchendX = 0;

      // 監聽手指碰觸螢幕
      window.addEventListener('touchstart', e => {
        touchstartX = e.changedTouches[0].screenX;
      }, { passive: true });

      // 監聽手指離開螢幕
      window.addEventListener('touchend', e => {
        touchendX = e.changedTouches[0].screenX;
        
        const swipeDistance = touchendX - touchstartX;
        // 滑動距離超過 40 像素就觸發
        if (Math.abs(swipeDistance) > 40) { 
          if (swipeDistance < 0) {
            console.log('👉 偵測到向左滑：強迫換下個月');
            // 模擬按下鍵盤的「右方向鍵」(keyCode 39)
            window.dispatchEvent(new KeyboardEvent('keydown', { keyCode: 39, bubbles: true }));
          } else {
            console.log('👈 偵測到向右滑：強迫換上個月');
            // 模擬按下鍵盤的「左方向鍵」(keyCode 37)
            window.dispatchEvent(new KeyboardEvent('keydown', { keyCode: 37, bubbles: true }));
          }
        }
      }, { passive: true });
    })();
  </script>

</body>
</html>
