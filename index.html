  /* 強制讓排班表切換月份的按鈕、箭頭顯示出來 */
  button, [role="button"], svg, path {
    color: #333333 !important; /* 強制把箭頭變成深灰色 */

  <body>
<div id="install-container" style="display: none; text-align: center; margin: 20px 0;">
  <button id="install-btn" style="background-color: #4CAF50; color: white; padding: 12px 24px; font-size: 16px; border: none; border-radius: 8px; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.1); font-weight: bold;">
    📥 下載 MoodWork App 至手機桌面
  </button>
</div>

<script>
  let deferredPrompt;
  // 修正名字：讓按鈕大腦與畫面完全連上線！
  const installContainer = document.getElementById('pwa-install-container') || document.getElementById('install-container');
  const installBtn = document.getElementById('pwa-install-btn') || document.getElementById('install-btn');

  // 監聽手機系統的下載觸發事件
  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault(); 
    deferredPrompt = e; 
    if (installContainer) installContainer.style.display = 'block'; 
  });

  // 當使用者點擊下載按鈕時
  if (installBtn) {
    installBtn.addEventListener('click', async () => {
      if (!deferredPrompt) return;
      deferredPrompt.prompt(); 
      const { outcome } = await deferredPrompt.userChoice;
      if (outcome === 'accepted') {
        console.log('使用者安裝了 App');
      }
      deferredPrompt = null;
      if (installContainer) installContainer.style.display = 'none'; 
    });
  }

  // 安裝成功後的提示
  window.addEventListener('appinstalled', () => {
    if (installContainer) installContainer.style.display = 'none';
    deferredPrompt = null;
    alert('MoodWork App 已成功安裝到妳的桌面囉！💰');
  });

  // === 📱 終極保證版：手機手指左右滑動換月份 ===
  let touchstartX = 0;
  let touchendX = 0;

  window.addEventListener('touchstart', e => {
    touchstartX = e.changedTouches[0].screenX;
  }, { passive: true });

  window.addEventListener('touchend', e => {
    touchendX = e.changedTouches[0].screenX;
    
    const swipeDistance = touchendX - touchstartX;
    if (Math.abs(swipeDistance) > 40) { // 滑動超過40像素就觸發
      if (swipeDistance < 0) {
        console.log('向左滑 -> 模擬鍵盤右鍵（下個月）');
        window.dispatchEvent(new KeyboardEvent('keydown', { keyCode: 39, bubbles: true }));
        // 備用防線：狂搜網頁右邊的物件點點看
        document.querySelectorAll('[role="button"], div, img, svg, button').forEach(el => {
          if(el.getBoundingClientRect().left > window.innerWidth * 0.6) {
            el.click();
          }
        });
      } else {
        console.log('向右滑 -> 模擬鍵盤左鍵（上個月）');
        window.dispatchEvent(new KeyboardEvent('keydown', { keyCode: 37, bubbles: true }));
        // 備用防線：狂搜網頁左邊的物件點點看
        document.querySelectorAll('[role="button"], div, img, svg, button').forEach(el => {
          if(el.getBoundingClientRect().left < window.innerWidth * 0.4) {
            el.click();
          }
        });
      }
    }
  }, { passive: true });
</script>
