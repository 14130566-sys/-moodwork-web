<!DOCTYPE html>
<html lang="zh-TW">
  <head>
    <meta charset="utf-8" />
    <meta httpEquiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>MoodWork</title>
    
    <link rel="manifest" href="./manifest.json">
    <link rel="apple-touch-icon" href="./icon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="MoodWork">

    <style id="expo-reset">
      html, body { height: 100%; }
      body { overflow: hidden; }
      #root { display: flex; height: 100%; flex: 1; }
    </style>
  </head>

  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    
    <div id="root"></div>

    <div id="pwa-install-container" style="display:none; position:fixed; bottom:20px; left:50%; transform:translateX(-50%); z-index:999999; width:90%; max-width:400px;">
      <button id="pwa-install-btn" style="width:100%; background-color:#4CAF50; color:white!important; border:none; padding:12px; font-size:16px; font-weight:bold; border-radius:8px; box-shadow:0 4px 10px rgba(0,0,0,0.3); cursor:pointer;">📥 安裝 MoodWork 至手機桌面</button>
    </div>

    <script src="_expo/static/js/web/entry-810e11be6ea0cf3040099d9f54fee9a5.js" defer></script>

    <script>
      // 1. 下載功能
      let deferredPrompt;
      window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault(); deferredPrompt = e;
        document.getElementById('pwa-install-container').style.display = 'block';
      });
      document.getElementById('pwa-install-btn').addEventListener('click', async () => {
        if (!deferredPrompt) return; deferredPrompt.prompt();
        await deferredPrompt.userChoice; deferredPrompt = null;
        document.getElementById('pwa-install-container').style.display = 'none';
      });
      window.addEventListener('appinstalled', () => {
        document.getElementById('pwa-install-container').style.display = 'none';
        deferredPrompt = null; alert('MoodWork App 已成功安裝到妳的桌面囉！💰');
      });

      // 2. 純淨左右滑動（手勢直接模擬點擊原本隱藏的換月按鈕）
      let touchstartX = 0;
      let touchendX = 0;
      window.addEventListener('touchstart', e => { touchstartX = e.changedTouches[0].screenX; }, { passive: true });
      window.addEventListener('touchend', e => {
        touchendX = e.changedTouches[0].screenX;
        const dist = touchendX - touchstartX;
        if (Math.abs(dist) > 40) {
          if (dist < 0) { // 往左滑 ➔ 下個月
            document.querySelectorAll('button, [role="button"], div, img, svg').forEach(el => {
              const r = el.getBoundingClientRect();
              if (r.left > window.innerWidth * 0.6 && r.top < 150 && r.width > 0) el.click();
            });
          } else { // 往右滑 ➔ 上個月
            document.querySelectorAll('button, [role="button"], div, img, svg').forEach(el => {
              const r = el.getBoundingClientRect();
              if (r.left < window.innerWidth * 0.4 && r.top < 150 && r.width > 0) el.click();
            });
          }
        }
      }, { passive: true });
    </script>
  </body>
</html>
